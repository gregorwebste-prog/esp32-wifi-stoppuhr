[env:esp32_client]
platform    = espressif32
board       = lolin32
framework   = arduino
upload_port = COM5
monitor_port = COM5
monitor_speed = 115200

lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9

build_flags =
    -D IS_CLIENT
    -D CONFIG_BT_ENABLED=0

board_build.f_cpu = 80000000L
